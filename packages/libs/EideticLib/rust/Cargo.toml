[package]
name = "eidetic-lib"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Deterministic text-to-anchor utility: pass a term, get back an FDC code and the dominant concept's Wikidata Q-ID. The FDC encoder lives in the lattice-lib crate; conformance-gated against the Swift port at EideticLib/Sources/EideticLib/."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "eidetic_lib"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# LatticeLib provides the FDC runtime (Fdc::encode_anchor) that lookup
# delegates to — the same dependency relationship as Swift EideticLib's
# `import LatticeLib`. Acyclic: LatticeLib does not depend on EideticLib.
lattice-lib = { path = "../../LatticeLib/rust" }
